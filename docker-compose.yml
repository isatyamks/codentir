services:
  app:
    build: .
    container_name: multimodal-rag
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - API_RELOAD=false
      - TESSERACT_PATH=/usr/bin/tesseract
    volumes:
      - rag-uploads:/app/data/uploads
      - rag-vectorstore:/app/data/vector_store
      - rag-logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

volumes:
  rag-uploads:
  rag-vectorstore:
  rag-logs:
